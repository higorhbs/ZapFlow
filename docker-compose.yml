x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis_data:/data
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "128mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    mem_limit: "256m"
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    init: true
    logging: *default-logging
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      ENABLE_WORKERS: ${ENABLE_WORKERS:-true}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      API_PORT: 3001
      REDIS_URL: redis://redis:6379
      WA_SESSION_PATH: /app/sessions
      GOOGLE_APPLICATION_CREDENTIALS: /app/.secrets/firebase-adminsdk.json
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://sandbox.asaas.com/api/v3}
    volumes:
      - wa_sessions:/app/sessions
      - ./.secrets:/app/.secrets:ro
    mem_limit: "512m"
    cpus: "1.5"

volumes:
  redis_data:
  wa_sessions:
